{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Shop{% endblock %}</title>
    <link href="{% static "css/base.css" %}" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header">
     
        <a href="/" class="logo">My Shop</a>

       
       

 
        <div class="user">
            {% if request.user.is_authenticated %}
                <span class="welcome">Hello, {{ request.user.username }}!</span>
                <span class="user-email">{{ request.user.email }}</span>
                <a href="{% url 'account:edit' %}" class="edit-link">Edit</a>
                <form method="post" action="{% url 'account:logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-link">Logout</button>
                </form>
            {% else %}
                <div class="auth-links">
                    <a href="{% url 'account:login' %}">Login</a> |
                    <a href="{% url 'account:register' %}">Register</a>
                </div>
            {% endif %}
        </div>
    </div>

    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
