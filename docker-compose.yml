services:
  db:
    image: postgres:16
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    command: gunicorn myshop.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - static_volume:/app/myshop/myshop/staticfiles
      - media_volume:/app/myshop/myshop/media
    working_dir: /app/myshop
    env_file: .env
    environment:
      - PYTHONPATH=/app/myshop
      - DJANGO_SETTINGS_MODULE=myshop.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: celery
    command: celery -A myshop worker -l info --concurrency=1
    working_dir: /app/myshop
    env_file: .env
    environment:
      - PYTHONPATH=/app/myshop
      - DJANGO_SETTINGS_MODULE=myshop.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:1.27
    ports:
      - "8000:80"
    volumes:
      - static_volume:/app/myshop/myshop/staticfiles
      - media_volume:/app/myshop/myshop/media
      - ./docker/nginx/nginx.config:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: